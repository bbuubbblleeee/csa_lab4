[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "SIM", "RUF"]

[tool.ruff.lint.per-file-ignores]
"src/*.py" = ["INP001"]

[tool.mypy]
python_version = "3.12"
strict = true

[[tool.mypy.overrides]]
module = ["isa", "machine", "translator"]
ignore_missing_imports = true

[tool.pytest.ini_options]
enable_assertion_pass_hook = true
