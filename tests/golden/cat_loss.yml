in_source: |
  %define INPUT_ADDR 2045
  %define OUTPUT_ADDR_SYMB 2046
  %define END_OF_INPUT 0

  .text
  .org 0x000
  trap_vector:
      jmp process_trap

  _start:
  useless:
      jmp useless

  process_trap:
      push_m INPUT_ADDR
      dup
      push END_OF_INPUT
      cmp
      jz print_char

      halt

  print_char:
      pop_m OUTPUT_ADDR_SYMB
      iret
in_stdin: "[(10, 'H'), (20, 'e'), (30, 'l'), (40, 'l'), (50, 'o'), (300, '\\0')]"
