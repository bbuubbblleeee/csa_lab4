in_source: |
  %define INPUT_ADDR 2045
  %define OUTPUT_ADDR_SYMB 2046
  %define END_OF_INPUT 0

  .text
  .org 0x000
  trap_vector:
      jmp process_trap

  _start:
  useless:
      jmp useless



  process_trap:
      push_m INPUT_ADDR
      dup
      push END_OF_INPUT
      cmp
      jz print_char      ; если stack.top == 0 (символ != END_OF_INPUT) -> прыгаем на печать

      halt

  print_char:
      pop_m OUTPUT_ADDR_SYMB
      iret
in_stdin: "[(10, 'H'), (20, 'e'), (30, 'l'), (40, 'l'), (50, 'o'), (60, '\\0')]"
machine_code: |
  START: 0001

  0000 - 14000002 - JMP 2
  0001 - 14000001 - JMP 1
  0002 - 020007FD - PUSH_M 2045
  0003 - 07000000 - DUP
  0004 - 01000000 - PUSH 0
  0005 - 11000000 - CMP
  0006 - 15000008 - JZ 8
  0007 - 1B000000 - HALT
  0008 - 050007FE - POP_M 2046
  0009 - 1A000000 - IRET
  0010-2047 - 00000000 - 0

output: |
  Output: Hello
  Overall quantity of ticks: 104
  Instructions executed: 52
